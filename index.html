<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Elegance | Premium Flowers & Cakes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <a href="index.html" class="brand-logo">
                    <img src="images/logo.png" alt="Logo">
                    <span class="logo">Bloom Elegance</span>
                </a>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="flowers.html">Flowers</a></li>
                <li><a href="cakes.html">Cakes</a></li>
                <li><a href="bouquets.html">Bouquets</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="slider">
        <div class="slide active"><img src="images/hero1.jpg" alt="Hero 1"></div>
        <div class="slide"><img src="images/hero2.jpg" alt="Hero 2"></div>
        <div class="slide"><img src="images/hero3.jpg" alt="Hero 3"></div>
        <div class="hero-text">
            <h1>Nature's Finest Blooms</h1>
            <p>Handcrafted with love, delivered with care.</p>
            <a href="flowers.html" class="btn">Explore Collection</a>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section-title">✨ New Arrivals</h2>
            <div class="gallery">
                <div class="card">
                    <img src="images/new1.jpg" alt="New">
                    <h3>Midnight Bloom</h3>
                    <p>Rs. 3200</p>
                    <button onclick="handleOrder('Midnight Bloom')" class="btn">Order Now</button>
                </div>
                <div class="card">
                    <img src="images/featured.png" alt="Featured">
                    <h3>Featured Choice</h3>
                    <p>Rs. 4500</p>
                    <button onclick="handleOrder('Featured Choice')" class="btn">Order Now</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Bloom Elegance | Premium Quality</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
