<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="navbar">
    <div class="logo">Bloomify</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="flowers.html">Flowers</a>
        <a href="cakes.html">Cakes</a>
        <a href="bouquets.html">Bouquets</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>
</header>

<section class="contact-section">
    <h2 class="section-title">Complete Your Order</h2>

    <form class="form-box" id="orderForm">
        <label>Your Name</label>
        <input type="text" id="orderName" required placeholder="Enter your name">

        <label>Your Address</label>
        <input type="text" id="orderAddress" required placeholder="Delivery address">

        <label>Your Phone Number</label>
        <input type="text" id="orderPhone" required placeholder="03XX-XXXXXXX">

        <label>Additional Notes</label>
        <textarea id="orderNotes" placeholder="Anything special?"></textarea>

        <button type="submit" class="btn">Place Order</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
