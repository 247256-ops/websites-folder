<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order | Bloom Elegance</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/hero2.jpg') center/cover no-repeat; min-height: 100vh; display: flex; flex-direction: column;">

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <a href="index.html" class="brand-logo">
                    <img src="images/logo.png" alt="Logo">
                    <span>Bloom Elegance</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="flowers.html">Flowers</a></li>
                <li><a href="cakes.html">Cakes</a></li>
                <li><a href="bouquets.html">Bouquets</a></li>
            </ul>
        </nav>
    </header>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 20px 40px;">
        <div class="form-box" style="margin: 0; backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.9); border-radius: 30px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;">
            
            <div style="margin-bottom: 25px;">
                <h2 style="color: #c2185b; font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px;">Complete Order</h2>
                <div style="background: #fff0f5; padding: 10px; border-radius: 10px; border-left: 5px solid #c2185b;">
                    <p id="itemShow" style="font-weight: 700; color: #c2185b; font-size: 1.1rem; margin: 0;"></p>
                </div>
            </div>

            <form onsubmit="placeOrder(event)">
                <div class="input-group" style="margin-bottom: 15px; text-align: left;">
                    <label style="font-size: 0.75rem; font-weight: 700; color: #c2185b; text-transform: uppercase;">Full Name</label>
                    <input type="text" placeholder="Enter your full name" required style="width: 100%; padding: 12px; border: 2px solid #ffd6e6; border-radius: 10px; margin-top: 5px; outline: none;">
                </div>

                <div class="input-group" style="margin-bottom: 15px; text-align: left;">
                    <label style="font-size: 0.75rem; font-weight: 700; color: #c2185b; text-transform: uppercase;">Delivery Address</label>
                    <input type="text" placeholder="Full street address, City" required style="width: 100%; padding: 12px; border: 2px solid #ffd6e6; border-radius: 10px; margin-top: 5px; outline: none;">
                </div>

                <div class="input-group" style="margin-bottom: 20px; text-align: left;">
                    <label style="font-size: 0.75rem; font-weight: 700; color: #c2185b; text-transform: uppercase;">Phone Number</label>
                    <input type="text" placeholder="+92 3XX XXXXXXX" required style="width: 100%; padding: 12px; border: 2px solid #ffd6e6; border-radius: 10px; margin-top: 5px; outline: none;">
                </div>

                <button type="submit" class="btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; border-radius: 12px; box-shadow: 0 10px 20px rgba(194,24,91,0.2);">CONFIRM ORDER 🌸</button>
            </form>
            
            <div style="margin-top: 20px;">
                <a href="index.html" style="text-decoration: none; color: #888; font-size: 0.85rem;"><i class="fa fa-arrow-left"></i> Cancel and go back</a>
            </div>
        </div>
    </div>

    <footer style="background: #4b2c34; color: white; padding: 40px 8% 20px;">
        <div class="footer-content" style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 30px;">
            <div class="footer-section">
                <h3>🌸 Bloom Elegance</h3>
                <p style="font-size: 0.9rem; opacity: 0.8;">Premium flowers and artisan cakes delivered with love.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul style="list-style: none; padding: 0; font-size: 0.9rem; opacity: 0.8; line-height: 1.8;">
                    <li><a href="flowers.html" style="color: white; text-decoration: none;">Flowers</a></li>
                    <li><a href="cakes.html" style="color: white; text-decoration: none;">Cakes</a></li>
                </ul>
            </div>
        </div>
        <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 20px; font-size: 0.8rem; opacity: 0.6;">
            <p>© 2026 Bloom Elegance. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const item = localStorage.getItem("selectedItem");
        document.getElementById("itemShow").innerText = "Ordering: " + (item || "Premium Selection");
    </script>
    <script src="script.js"></script>
</body>
</html>
